<html>
    <head>
        <title>Regestration Form</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background:linear-gradient(to right, #b5ffb8, #fffeec);
        margin: 0;
        padding: 20px;
    }
    form
    {
        padding:80px;
    }

    table {
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        background-color:#fffeec;
        border-collapse: collapse;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        border-radius: 10px;
    }

    th {
        background-color: #4CAF50;
        color: white;
        padding: 10px;
        border-radius: 10px 10px 0 0;
    }

    td {
        padding-left: 20px;
        white-space: nowrap;
        padding: 10px;
        padding-right: 20px;
        
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    input[type="date"] {
        width: 100%;
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    input[type="submit"] {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    input[type="submit"]:hover {
        background-color: #45a049;
    }
    .container {
    width: 1200px;
    margin: 0 auto;
    }
</style>
    </head>
<meta name="viewport" content="width=1200, initial-scale=1.0">
<body>
    
    <form>
        <table>
        <tr>
            <th colspan="3" style="text-align: center; padding: 20px;">
             <h2> STUDENT REGESTRATION FORM </h2>
            </th>
        </tr>
        <tr>
            <td style ="width: 200px; padding-right: 100px;">
                <label for="name">First Name:</label><br>
                <input type="text" id="name" name="name" required style="width: 200px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br>
            </td>
            <td style ="width: 200px; padding-right: 100px;">
                <label for="middle_name">Middle Name:</label><br>
                <input type="text" id="middle_name" name="middle_name" required style="width: 200px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br>
            </td>
            <td style ="width: 200px;">
                <label for="last_name">Last Name:</label><br>
                <input type="text" id="last_name" name="last_name" required style="width: 200px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br>
            </td>
        </tr>
        <tr>
            <td style ="width: 200px; padding-right: 100px;">
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br>
            </td>
            <td style ="width: 200px; padding-right: 100px;">
                <label for="phone">Phone Number:</label><br>
                <input type="tel" id="phone" name="phone" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" maxlength="10"><br> 
            </td>
            <td style ="width: 200px;">
                <label for="dob">Date of Birth:</label><br>
                <input type="date" id="dob" name="dob" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br>
            </td>
        </tr>
         <tr>
            <td colspan="3" style="padding-top: 10px;">
                <label for="address">Address:</label><br>
                <input type="text" id="address" name="address" required style="width: 100%;height: 60px; padding: 8px; border: 1px solid #ccc; border-radius: 4px;"><br>
            </td>
        </tr>
        <tr>
            <td style ="width: 200px; padding-right: 100px;">
                <label for="city">City:</label><br>
                <select id="city" name="city" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="">Select a city</option>
                    <option value="city1">Ahmedabad</option>
                    <option value="city2">Baroda</option>
                    <option value="city3">Rajkot</option>
                </select><br>
            </td>
            <td style ="width: 200px; padding-right: 100px;">
                <label for="state">State:</label><br>
                <select id="state" name="state" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="">Select a state</option>
                    <option value="state1">Gujarat</option>
                    <option value="state2">Rajasthan</option>
                    <option value="state3">Maharashtra</option>
                </select><br>
            </td>
            <td style ="width: 200px;">
                <label for="zip">Zip Code:</label><br>
                <input type="tel" id="zip" name="zip" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;" pattern="^[1-9][0-9]{5}$" maxlength="6"><br>
            </td>
        </tr>
        <tr style="text-align: center;">
            <td colspan="3" style="padding-top: 40px;">
                <input type="submit" value="Register">
            </td>
        </tr>       
        
        </table>
    </form>
    
</body>
</html>
